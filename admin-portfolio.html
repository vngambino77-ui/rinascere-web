<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Portfolio - Rinascere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #d4af37;
        }

        h1 {
            color: #d4af37;
            margin-bottom: 30px;
            text-align: center;
        }

        .section {
            background: rgba(255,255,255,0.03);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .upload-box {
            border: 2px dashed #d4af37;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-box:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        input[type="file"] {
            display: none;
        }

        .current-photo {
            text-align: center;
            margin: 20px 0;
        }

        .current-photo img {
            max-width: 200px;
            border-radius: 10px;
            border: 2px solid #d4af37;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .portfolio-item {
            position: relative;
            border: 2px solid #d4af37;
            border-radius: 10px;
            overflow: hidden;
        }

        .portfolio-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .portfolio-item .actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .portfolio-item button {
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .portfolio-item .number {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(212, 175, 55, 0.9);
            color: #1a1a1a;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #f0c14b;
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .status.error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #dc2626;
            color: #fca5a5;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            color: #d4af37;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .empty-slot {
            border: 2px dashed #666;
            border-radius: 10px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="admin.html" class="btn-back">← Volver al Admin</a>
        
        <h1>📸 Gestionar Portfolio</h1>

        <!-- Foto de perfil -->
        <div class="section">
            <h2>Tu Foto (Sobre mí)</h2>
            
            <div class="current-photo" id="currentProfile">
                <p style="color: #999;">Cargando foto actual...</p>
            </div>

            <div class="upload-box" onclick="document.getElementById('profileInput').click()">
                <p style="font-size: 1.5em;">📸</p>
                <p>Click para cambiar tu foto de perfil</p>
            </div>
            <input type="file" id="profileInput" accept="image/*">
            
            <button class="btn" id="btnUploadProfile" style="display: none;">⬆️ Subir Foto de Perfil</button>
            <div class="status" id="statusProfile"></div>
        </div>

        <!-- Portfolio -->
        <div class="section">
            <h2>Fotos Portfolio (máximo 6)</h2>
            
            <div class="portfolio-grid" id="portfolioGrid">
                <!-- Se carga dinámicamente -->
            </div>

            <div class="upload-box" onclick="document.getElementById('portfolioInput').click()" style="margin-top: 20px;">
                <p style="font-size: 1.5em;">🖼️</p>
                <p>Click para agregar fotos al portfolio</p>
                <p style="font-size: 0.9em; color: #999; margin-top: 5px;">Podés agregar hasta 6 fotos</p>
            </div>
            <input type="file" id="portfolioInput" accept="image/*" multiple>
            
            <button class="btn" id="btnUploadPortfolio" style="display: none;">⬆️ Subir Fotos</button>
            <div class="status" id="statusPortfolio"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC-8dbhyKVKDlEndWJ3UfEEu3EiAnZI-XU",
            authDomain: "rinascere-web-2025.firebaseapp.com",
            projectId: "rinascere-web-2025",
            storageBucket: "rinascere-web-2025.firebasestorage.app",
            messagingSenderId: "781300280640",
            appId: "1:781300280640:web:34c98efa7780a8218cdea5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dwqvqpkbe/image/upload';
        const UPLOAD_PRESET = 'rinascere_fotos';

        let portfolioFiles = [];

        // Cargar datos actuales
        async function cargarDatos() {
            try {
                const docRef = doc(db, 'config', 'portfolio');
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Mostrar foto de perfil
                    if (data.profileUrl) {
                        document.getElementById('currentProfile').innerHTML = `
                            <img src="${data.profileUrl}" alt="Foto actual">
                            <p style="color: #10b981; margin-top: 10px;">✓ Foto activa</p>
                        `;
                    } else {
                        document.getElementById('currentProfile').innerHTML = `
                            <p style="color: #999;">No hay foto de perfil aún</p>
                        `;
                    }

                    // Mostrar portfolio
                    mostrarPortfolio(data.portfolioUrls || []);
                } else {
                    document.getElementById('currentProfile').innerHTML = `
                        <p style="color: #999;">No hay foto de perfil aún</p>
                    `;
                    mostrarPortfolio([]);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function mostrarPortfolio(urls) {
            const grid = document.getElementById('portfolioGrid');
            grid.innerHTML = '';

            // Mostrar fotos existentes
            urls.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = 'portfolio-item';
                div.innerHTML = `
                    <img src="${url}" alt="Portfolio ${index + 1}">
                    <div class="number">#${index + 1}</div>
                    <div class="actions">
                        <button onclick="eliminarPortfolio(${index})">🗑️</button>
                    </div>
                `;
                grid.appendChild(div);
            });

            // Mostrar slots vacíos
            const slotsVacios = 6 - urls.length;
            for (let i = 0; i < slotsVacios; i++) {
                const div = document.createElement('div');
                div.className = 'empty-slot';
                div.innerHTML = `Slot #${urls.length + i + 1}<br>vacío`;
                grid.appendChild(div);
            }
        }

        // Subir foto de perfil
        document.getElementById('profileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('btnUploadProfile').style.display = 'block';
            }
        });

        document.getElementById('btnUploadProfile').addEventListener('click', async () => {
            const file = document.getElementById('profileInput').files[0];
            if (!file) return;

            const btn = document.getElementById('btnUploadProfile');
            btn.disabled = true;
            btn.textContent = '⏳ Subiendo...';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('folder', 'rinascere');
                formData.append('public_id', 'vero-profile');

                const response = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Error al subir');

                const data = await response.json();

                // Guardar en Firebase
                const docRef = doc(db, 'config', 'portfolio');
                const docSnap = await getDoc(docRef);
                const currentData = docSnap.exists() ? docSnap.data() : {};

                await setDoc(docRef, {
                    ...currentData,
                    profileUrl: data.secure_url
                });

                mostrarStatus('statusProfile', 'success', '✅ Foto de perfil actualizada');
                setTimeout(() => cargarDatos(), 1000);

            } catch (error) {
                mostrarStatus('statusProfile', 'error', '❌ Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '⬆️ Subir Foto de Perfil';
                btn.style.display = 'none';
            }
        });

        // Subir fotos portfolio
        document.getElementById('portfolioInput').addEventListener('change', (e) => {
            portfolioFiles = Array.from(e.target.files);
            if (portfolioFiles.length > 0) {
                document.getElementById('btnUploadPortfolio').style.display = 'block';
            }
        });

        document.getElementById('btnUploadPortfolio').addEventListener('click', async () => {
            if (portfolioFiles.length === 0) return;

            const btn = document.getElementById('btnUploadPortfolio');
            btn.disabled = true;

            try {
                // Obtener fotos actuales
                const docRef = doc(db, 'config', 'portfolio');
                const docSnap = await getDoc(docRef);
                const currentData = docSnap.exists() ? docSnap.data() : {};
                const currentUrls = currentData.portfolioUrls || [];

                if (currentUrls.length + portfolioFiles.length > 6) {
                    throw new Error('No podés tener más de 6 fotos en el portfolio');
                }

                const newUrls = [];

                for (let i = 0; i < portfolioFiles.length; i++) {
                    btn.textContent = `⏳ Subiendo ${i + 1}/${portfolioFiles.length}...`;

                    const formData = new FormData();
                    formData.append('file', portfolioFiles[i]);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    formData.append('folder', 'rinascere');
                    formData.append('public_id', `portfolio-${currentUrls.length + i + 1}`);

                    const response = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error(`Error en foto ${i + 1}`);

                    const data = await response.json();
                    newUrls.push(data.secure_url);
                }

                // Guardar en Firebase
                await setDoc(docRef, {
                    ...currentData,
                    portfolioUrls: [...currentUrls, ...newUrls]
                });

                mostrarStatus('statusPortfolio', 'success', `✅ ${newUrls.length} fotos agregadas`);
                setTimeout(() => cargarDatos(), 1000);

            } catch (error) {
                mostrarStatus('statusPortfolio', 'error', '❌ ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '⬆️ Subir Fotos';
                btn.style.display = 'none';
                portfolioFiles = [];
                document.getElementById('portfolioInput').value = '';
            }
        });

        // Eliminar foto portfolio
        window.eliminarPortfolio = async function(index) {
            if (!confirm('¿Eliminar esta foto del portfolio?')) return;

            try {
                const docRef = doc(db, 'config', 'portfolio');
                const docSnap = await getDoc(docRef);
                const data = docSnap.data();
                const urls = data.portfolioUrls || [];

                urls.splice(index, 1);

                await setDoc(docRef, {
                    ...data,
                    portfolioUrls: urls
                });

                cargarDatos();
            } catch (error) {
                alert('Error al eliminar: ' + error.message);
            }
        };

        function mostrarStatus(id, tipo, mensaje) {
            const status = document.getElementById(id);
            status.className = `status ${tipo}`;
            status.textContent = mensaje;
            status.style.display = 'block';
        }

        // Cargar al inicio
        cargarDatos();
    </script>
</body>
</html>
