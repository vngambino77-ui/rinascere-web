<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Fotos - Ph. Rinascere</title>
    <link rel="icon" href="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 50px;
        }

        h1 {
            font-size: 2em;
            color: #d4af37;
        }

        .btn-volver {
            background: #d4af37;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-volver:hover {
            background: #f0c14b;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 2px solid #d4af37;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d4af37;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: #f5f5f5;
            font-size: 1em;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f0c14b;
            background: rgba(255,255,255,0.15);
        }

        .upload-area {
            border: 2px dashed #d4af37;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #f0c14b;
            background: rgba(212, 175, 55, 0.1);
        }

        .upload-area.dragover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #f0c14b;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-eliminar {
            background: #dc2626;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-eliminar:hover {
            background: #b91c1c;
        }

        .btn-subir {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-subir:hover {
            background: #f0c14b;
        }

        .btn-subir:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f0c14b);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            font-weight: bold;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }

        .status-message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .status-message.error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #dc2626;
            color: #fca5a5;
        }

        .preview-portada {
            max-width: 300px;
            max-height: 300px;
            margin: 15px auto;
            border-radius: 5px;
            display: none;
        }

        .precio-container {
            display: none;
            margin-top: 15px;
        }

        .precio-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" alt="Logo" class="logo">
        <h1>Subir Fotos</h1>
        <a href="admin.html" class="btn-volver">← Volver al Admin</a>
    </div>

    <div class="container">
        <form id="uploadForm">
            <div class="form-group">
                <label for="portadaUpload">Foto de Portada del Álbum *</label>
                <div class="upload-area" id="uploadPortada">
                    <p>📸 Click para seleccionar la foto de portada</p>
                    <p style="font-size: 0.9em; color: #999; margin-top: 10px;">Esta imagen aparecerá en la galería principal</p>
                </div>
                <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png,image/webp">
                <img id="portadaPreview" class="preview-portada">
            </div>

            <div class="form-group">
                <label for="albumNombre">Nombre del Álbum *</label>
                <input type="text" id="albumNombre" required placeholder="Ej: Carrera Nocturna 2024">
            </div>

            <div class="form-group">
                <label for="albumFecha">Fecha del Evento *</label>
                <input type="date" id="albumFecha" required>
            </div>

            <div class="form-group">
                <label for="driveLink">Enlace de Google Drive *</label>
                <input 
                    type="url" 
                    id="driveLink" 
                    required 
                    placeholder="https://drive.google.com/drive/folders/..."
                >
                <p style="color: #999; font-size: 0.9em; margin-top: 5px;">
                    Pegá el enlace de la carpeta de Google Drive con todas las fotos del evento
                </p>
            </div>

            <div class="form-group">
                <label for="albumMetodo">Método de Venta *</label>
                <select id="albumMetodo" required onchange="mostrarPrecio()">
                    <option value="">Seleccioná un método</option>
                    <option value="gratis">🎁 Gratis (Descarga directa)</option>
                    <option value="cafecito">☕ Cafecito (Cliente elige precio)</option>
                    <option value="precio_fijo">💰 Precio Fijo (Vos ponés precio)</option>
                </select>

                <div id="precioContainer" class="precio-container">
                    <label for="albumPrecio">Precio Sugerido/Fijo (ARS) *</label>
                    <input 
                        type="number" 
                        id="albumPrecio" 
                        placeholder="3000" 
                        min="100"
                        step="100"
                    >
                    <p style="color: #999; font-size: 0.9em; margin-top: 5px;" id="precioHelp"></p>
                </div>
            </div>

            <div class="form-group">
                <label for="albumDescripcion">Descripción (opcional)</label>
                <textarea 
                    id="albumDescripcion" 
                    rows="3" 
                    placeholder="Información adicional del evento..."
                ></textarea>
            </div>

            <button type="submit" class="btn-subir" id="btnSubir">📤 Subir Álbum</button>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>

            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCikmYa4r3LwdWDUZX9_RL9lx_EqGUF1Bg",
            authDomain: "rinascere-fotos.firebaseapp.com",
            projectId: "rinascere-fotos",
            storageBucket: "rinascere-fotos.firebasestorage.app",
            messagingSenderId: "844732353699",
            appId: "1:844732353699:web:7654d5fc2b85754a123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let portadaFile = null;

        // Upload portada
        document.getElementById('uploadPortada').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                portadaFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('portadaPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        window.mostrarPrecio = function() {
            const metodo = document.getElementById('albumMetodo').value;
            const precioContainer = document.getElementById('precioContainer');
            const precioInput = document.getElementById('albumPrecio');
            const precioHelp = document.getElementById('precioHelp');

            if (metodo === 'cafecito') {
                precioContainer.classList.add('active');
                precioInput.required = true;
                precioInput.placeholder = '3000';
                precioHelp.textContent = 'Precio sugerido que verá el cliente (puede pagar más o menos)';
            } else if (metodo === 'precio_fijo') {
                precioContainer.classList.add('active');
                precioInput.required = true;
                precioInput.placeholder = '5000';
                precioHelp.textContent = 'Precio fijo que debe pagar el cliente para descargar';
            } else {
                precioContainer.classList.remove('active');
                precioInput.required = false;
            }
        };

        // Subir a Cloudinary
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'rinascere_fotos');
            formData.append('folder', 'rinascere/portadas');

            const response = await fetch(
                'https://api.cloudinary.com/v1_1/dwqvqpkbe/image/upload',
                {
                    method: 'POST',
                    body: formData
                }
            );

            if (!response.ok) throw new Error('Error al subir portada');
            
            const data = await response.json();
            return data.secure_url;
        }

        // Enviar formulario
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!portadaFile) {
                mostrarMensaje('error', 'Por favor seleccioná una foto de portada');
                return;
            }

            const nombre = document.getElementById('albumNombre').value;
            const fecha = document.getElementById('albumFecha').value;
            const driveLink = document.getElementById('driveLink').value;
            const metodo = document.getElementById('albumMetodo').value;
            const precio = document.getElementById('albumPrecio').value;
            const descripcion = document.getElementById('albumDescripcion').value;

            const folderId = extractFolderId(driveLink);
            
            if (!folderId) {
                mostrarMensaje('error', 'El enlace de Google Drive no es válido');
                return;
            }

            document.getElementById('btnSubir').disabled = true;
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('statusMessage').style.display = 'none';

            try {
                document.getElementById('progressFill').style.width = '30%';
                document.getElementById('progressFill').textContent = '30%';

                // Subir portada a Cloudinary
                const portadaUrl = await uploadToCloudinary(portadaFile);

                document.getElementById('progressFill').style.width = '60%';
                document.getElementById('progressFill').textContent = '60%';

                // Crear álbum en Firestore
                const albumData = {
                    nombre: nombre,
                    fecha: fecha,
                    descripcion: descripcion || '',
                    metodo: metodo,
                    precio: metodo === 'gratis' ? 0 : Number(precio),
                    portadaUrl: portadaUrl,
                    driveFolderId: folderId,
                    driveLink: `https://drive.google.com/drive/folders/${folderId}`,
                    esPublico: true,
                    createdAt: new Date().toISOString()
                };

                await addDoc(collection(db, 'albumes'), albumData);

                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressFill').textContent = '100%';

                mostrarMensaje('success', `✓ Álbum "${nombre}" creado exitosamente`);
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('error', 'Error al crear el álbum: ' + error.message);
                document.getElementById('btnSubir').disabled = false;
            }
        });

        function extractFolderId(url) {
            const match = url.match(/folders\/([a-zA-Z0-9_-]+)/);
            return match ? match[1] : null;
        }

        function mostrarMensaje(tipo, texto) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.className = `status-message ${tipo}`;
            statusMessage.textContent = texto;
            statusMessage.style.display = 'block';
        }
    </script>
</body>
</html>
