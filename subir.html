<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Fotos - Ph. Rinascere</title>
    <link rel="icon" href="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 50px;
        }

        h1 {
            font-size: 2em;
            color: #d4af37;
        }

        .btn-volver {
            background: #d4af37;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-volver:hover {
            background: #f0c14b;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 2px solid #d4af37;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d4af37;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: #f5f5f5;
            font-size: 1em;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f0c14b;
            background: rgba(255,255,255,0.15);
        }

        .upload-area {
            border: 2px dashed #d4af37;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #f0c14b;
            background: rgba(212, 175, 55, 0.1);
        }

        .upload-area.dragover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #f0c14b;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-eliminar {
            background: #dc2626;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-eliminar:hover {
            background: #b91c1c;
        }

        .btn-subir {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-subir:hover {
            background: #f0c14b;
        }

        .btn-subir:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f0c14b);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            font-weight: bold;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }

        .status-message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .status-message.error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #dc2626;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" alt="Logo" class="logo">
        <h1>Subir Fotos</h1>
        <a href="admin.html" class="btn-volver">← Volver al Admin</a>
    </div>

    <div class="container">
        <form id="uploadForm">
            <div class="form-group">
                <label for="albumNombre">Nombre del Álbum *</label>
                <input type="text" id="albumNombre" required placeholder="Ej: Carrera Nocturna 2024">
            </div>

            <div class="form-group">
                <label for="albumFecha">Fecha del Evento *</label>
                <input type="date" id="albumFecha" required>
            </div>

            <div class="form-group">
                <label for="albumMetodo">Método de Venta *</label>
                <select id="albumMetodo" required>
                    <option value="libre">Libre (Gratis)</option>
                    <option value="cafecito">Cafecito (Pago)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Fotos *</label>
                <div class="upload-area" id="uploadArea">
                    <p>📸 Arrastrá las fotos acá o hacé click para seleccionar</p>
                    <p style="font-size: 0.9em; color: #999; margin-top: 10px;">Formatos: JPG, PNG, WEBP</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/jpeg,image/jpg,image/png,image/webp">
                <div class="file-list" id="fileList"></div>
            </div>

            <button type="submit" class="btn-subir" id="btnSubir">📤 Subir Álbum</button>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>

            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCikmYa4r3LwdWDUZX9_RL9lx_EqGUF1Bg",
            authDomain: "rinascere-fotos.firebaseapp.com",
            projectId: "rinascere-fotos",
            storageBucket: "rinascere-fotos.firebasestorage.app",
            messagingSenderId: "844732353699",
            appId: "1:844732353699:web:7654d5fc2b85754a123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedFiles = [];

        // Elementos del DOM
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const uploadForm = document.getElementById('uploadForm');
        const btnSubir = document.getElementById('btnSubir');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusMessage = document.getElementById('statusMessage');

        // Click en área de upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag & Drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(file => 
                file.type.startsWith('image/')
            );
            addFiles(files);
        });

        // Selección de archivos
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            addFiles(files);
        });

        // Agregar archivos
        function addFiles(files) {
            selectedFiles = [...selectedFiles, ...files];
            renderFileList();
        }

        // Renderizar lista de archivos
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }

            fileList.innerHTML = selectedFiles.map((file, index) => `
                <div class="file-item">
                    <span>${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                    <button type="button" class="btn-eliminar" onclick="eliminarArchivo(${index})">
                        ✕
                    </button>
                </div>
            `).join('');
        }

        // Eliminar archivo
        window.eliminarArchivo = function(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        };

        // Subir a Cloudinary
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'rinascere_fotos');
            formData.append('folder', 'rinascere');

            const response = await fetch(
                'https://api.cloudinary.com/v1_1/dwqvqpkbe/image/upload',
                {
                    method: 'POST',
                    body: formData
                }
            );

            if (!response.ok) throw new Error('Error al subir a Cloudinary');
            
            const data = await response.json();
            return data.secure_url;
        }

        // Enviar formulario
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (selectedFiles.length === 0) {
                mostrarMensaje('error', 'Seleccioná al menos una foto');
                return;
            }

            const albumNombre = document.getElementById('albumNombre').value;
            const albumFecha = document.getElementById('albumFecha').value;
            const albumMetodo = document.getElementById('albumMetodo').value;

            btnSubir.disabled = true;
            progressBar.style.display = 'block';
            statusMessage.style.display = 'none';

            try {
                // Crear álbum en Firestore
                const albumRef = await addDoc(collection(db, 'albumes'), {
                    nombre: albumNombre,
                    fecha: albumFecha,
                    metodo: albumMetodo,
                    cobro: 'pendiente',
                    esPublico: albumMetodo === 'libre',
                    createdAt: new Date().toISOString()
                });

                // Subir fotos
                const totalFiles = selectedFiles.length;
                let uploadedFiles = 0;

                for (const file of selectedFiles) {
                    // Subir a Cloudinary
                    const url = await uploadToCloudinary(file);

                    // Guardar en Firestore
                    await addDoc(collection(db, 'albumes', albumRef.id, 'fotos'), {
                        url: url,
                        nombre: file.name,
                        dorsal: '', // Se puede agregar después
                        uploadedAt: new Date().toISOString()
                    });

                    uploadedFiles++;
                    const progress = Math.round((uploadedFiles / totalFiles) * 100);
                    progressFill.style.width = `${progress}%`;
                    progressFill.textContent = `${progress}%`;
                }

                mostrarMensaje('success', `✓ Álbum creado exitosamente con ${totalFiles} fotos`);
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('error', 'Error al crear el álbum: ' + error.message);
                btnSubir.disabled = false;
            }
        });

        function mostrarMensaje(tipo, texto) {
            statusMessage.className = `status-message ${tipo}`;
            statusMessage.textContent = texto;
            statusMessage.style.display = 'block';
        }
    </script>
</body>
</html>
