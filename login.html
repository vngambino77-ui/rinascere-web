<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ph. Rinascere</title>
    <link rel="icon" href="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 450px;
            margin: 40px 20px;
            padding: 50px 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 2px solid #d4af37;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 0 auto 30px;
        }

        h1 {
            font-size: 2em;
            color: #d4af37;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #d4af37;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #f5f5f5;
            font-size: 1.1em;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #f0c14b;
            background: rgba(255,255,255,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #f0c14b;
            transform: scale(1.02);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .btn-home {
            display: block;
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            color: #d4af37;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: rgba(255,255,255,0.2);
            border-color: #d4af37;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" alt="Logo" class="logo">
        
        <h1>Acceso Admin</h1>
        <p class="subtitle">Panel de administración</p>

        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Ingresá tu contraseña"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn-login">
                Ingresar →
            </button>

            <div class="error-message" id="errorMessage">
                Contraseña incorrecta. Intentá de nuevo.
            </div>
        </form>

        <a href="index.html" class="btn-home">← Volver al sitio</a>
    </div>

    <script>
        // ⚠️ ESTO ES SOLO PARA DESARROLLO
        // En producción, deberías usar Firebase Authentication
        const ADMIN_PASSWORD = 'rinascere2024';

        function login(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (password === ADMIN_PASSWORD) {
                // Guardar sesión
                localStorage.setItem('adminLoggedIn', 'true');
                
                // Redirigir a admin
                window.location.href = 'admin.html';
            } else {
                // Mostrar error
                errorMessage.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        // Verificar si ya está logueado
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
