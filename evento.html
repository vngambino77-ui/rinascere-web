<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Evento</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyA-OR-akYl4oyedREi6HH59MZrsXD4ULYg",
  authDomain: "rinascere-fotografias.firebaseapp.com",
  projectId: "rinascere-fotografias"
});

const db = firebase.firestore();

const CLOUD = "dwqvqpkbe";
const LOGO = "My Brand/logo_png_fwpt2v";

function urlPreview(id){
  return `https://res.cloudinary.com/${CLOUD}/image/upload/l_${LOGO},o_40,w_0.4,g_center/fl_layer_apply,w_500,q_auto/${id}`;
}

function urlOriginal(id){
  return `https://res.cloudinary.com/${CLOUD}/image/upload/q_auto/${id}`;
}
</script>

<style>
body{font-family:Arial;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
.card{cursor:pointer;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.card img{width:100%;height:200px;object-fit:cover}
.card.sel{outline:3px solid gold}
button{margin-top:20px;padding:10px 20px}
</style>

</head>
<body>

<h1 id="titulo"></h1>

<div id="portada"></div>

<div class="grid" id="grid"></div>

<button onclick="comprar()">Comprar</button>

<script>
let seleccionadas = [];
let album = null;

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

async function cargar(){

  const snap = await db.collection("albumes")
    .where("slug","==",slug)
    .get();

  if(snap.empty){
    alert("No existe álbum");
    return;
  }

  album = snap.docs[0].data();

  document.getElementById("titulo").innerText = album.nombre;

  if(album.portada){
    document.getElementById("portada").innerHTML =
      `<img src="${album.portada}" style="width:100%;max-height:300px;object-fit:cover">`;
  }

  render(album.fotos);
}

function render(fotos){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  fotos.forEach(foto => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<img src="${urlPreview(foto)}">`;

    div.onclick = () => {

      div.classList.toggle("sel");

      if(seleccionadas.includes(foto)){
        seleccionadas = seleccionadas.filter(f => f !== foto);
      }else{
        seleccionadas.push(foto);
      }

      console.log(seleccionadas);
    };

    grid.appendChild(div);
  });
}

async function comprar(){

  if(seleccionadas.length === 0){
    alert("Seleccioná fotos");
    return;
  }

  const res = await fetch("/api/crear-preferencia",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      fotos: seleccionadas,
      precio: album.precio,
      titulo: album.nombre
    })
  });

  const data = await res.json();

  window.location.href = data.init_point;
}

cargar();
</script>

</body>
</html>
