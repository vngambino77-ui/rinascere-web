<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyA-OR-akYl4oyedREi6HH59MZrsXD4ULYg",
  authDomain: "rinascere-fotografias.firebaseapp.com",
  projectId: "rinascere-fotografias"
});
const db = firebase.firestore();
</script>

<style>
body{font-family:Arial;padding:20px;background:#fafafa}
input,textarea,button{
  padding:10px;
  margin:6px;
  width:300px;
}
button{
  background:#C9A84C;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>Crear Álbum</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="slug" placeholder="slug (ej: boda-maria)"><br>
<input id="precio" placeholder="precio"><br>
<input id="vendedor" placeholder="email Mercado Pago fotógrafo"><br>

<textarea id="fotos" placeholder="IDs Cloudinary separados por coma"></textarea><br>

<button onclick="crear()">Crear álbum</button>

<script>

async function crear(){

  const nombre = document.getElementById("nombre").value;
  const slug = document.getElementById("slug").value;
  const precio = Number(document.getElementById("precio").value);
  const vendedorMP = document.getElementById("vendedor").value;

  const fotos = document.getElementById("fotos").value
    .split(",")
    .map(f => f.trim())
    .filter(f => f);

  await db.collection("albumes").add({
    nombre,
    slug,
    precio,
    vendedorMP,
    fotos
  });

  alert("Álbum creado ✔");

}

</script>

</body>
</html>
