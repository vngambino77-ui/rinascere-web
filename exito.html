<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago exitoso — Ph. Rinascere Fotografías</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA-OR-akYl4oyedREi6HH59MZrsXD4ULYg",
      authDomain: "rinascere-fotografias.firebaseapp.com",
      projectId: "rinascere-fotografias",
      storageBucket: "rinascere-fotografias.firebasestorage.app",
      messagingSenderId: "234239060454",
      appId: "1:234239060454:web:99f35e14e47f0bcdbf8e27"
    });
    const db = firebase.firestore();
    const CLOUD = "dwqvqpkbe";
  </script>
  <style>
    :root {
      --dorado: #C9A84C; --dorado-claro: #E8C97A; --dorado-oscuro: #A07830;
      --blanco: #fff; --crema: #FAF8F4; --gris: #888; --negro: #1A1A1A;
      --verde: #27ae60;
      --fuente-t: 'Playfair Display', serif; --fuente-c: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--fuente-c); background: var(--crema); color: var(--negro); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--blanco); border-radius: 24px; padding: 48px 36px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
    .ico { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-family: var(--fuente-t); font-size: 2rem; margin-bottom: 10px; }
    h1 span { color: var(--dorado); }
    .sub { color: var(--gris); font-size: 0.93rem; line-height: 1.7; margin-bottom: 28px; }
    .estado { background: #e8f8ef; border-radius: 12px; padding: 16px; margin-bottom: 24px; font-size: 0.9rem; color: #1a6b35; font-weight: 600; display: none; }
    .estado.visible { display: block; }
    .descarga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin: 0 0 20px; }
    .descarga-item { border-radius: 10px; overflow: hidden; border: 1px solid #eee; background: var(--crema); }
    .descarga-item img { width: 100%; height: 80px; object-fit: cover; display: block; }
    .descarga-item a { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 7px; font-size: 0.72rem; color: var(--dorado-oscuro); font-weight: 600; text-decoration: none; background: var(--blanco); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 50px; border: none; font-family: var(--fuente-c); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; width: 100%; margin-bottom: 10px; }
    .btn-dorado { background: linear-gradient(135deg, var(--dorado), var(--dorado-claro)); color: #fff; box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
    .btn-verde { background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; }
    .btn-outline { background: transparent; border: 2px solid var(--dorado); color: var(--dorado-oscuro); }
    .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: var(--dorado); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cargando { padding: 20px; color: var(--gris); font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="ico" id="ico">⏳</div>
  <h1 id="titulo">Verificando <span>pago</span>...</h1>
  <p class="sub" id="sub">Estamos confirmando tu pago con Mercado Pago.</p>

  <div class="estado" id="estado"></div>

  <div id="contenido">
    <div class="cargando"><div class="spinner"></div>Procesando...</div>
  </div>
</div>

<script>
  // ✅ urlHD correcta con fl_attachment para forzar descarga
  function urlHD(pid, nombre) {
    const n = encodeURIComponent(nombre || 'rinascere_foto');
    return `https://res.cloudinary.com/${CLOUD}/image/upload/fl_attachment:${n}/q_100/f_jpg/${pid}`;
  }

  function limpiarId(id) {
    if (!id) return '';
    if (id.startsWith('http')) {
      const m = id.match(/\/upload\/(?:v\d+\/)?(.+?)(?:\.\w+)?$/);
      return m ? m[1] : id;
    }
    return id.replace(/\.\w+$/, '');
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status') || params.get('collection_status');
    const pedidoId = params.get('external_reference');

    // ✅ Si el pago fue rechazado, mostrar error
    if (status === 'rejected' || status === 'failure') {
      document.getElementById('ico').textContent = '❌';
      document.getElementById('titulo').innerHTML = 'Pago <span>no procesado</span>';
      document.getElementById('sub').textContent = 'Hubo un problema con el pago. Podés intentarlo de nuevo.';
      document.getElementById('contenido').innerHTML = `
        <a href="javascript:history.back()" class="btn btn-dorado">← Volver e intentar de nuevo</a>
        <a href="index.html" class="btn btn-outline">Ir al inicio</a>`;
      return;
    }

    // ✅ Si no hay pedidoId, no podemos hacer nada
    if (!pedidoId) {
      document.getElementById('ico').textContent = '⚠️';
      document.getElementById('titulo').innerHTML = 'Algo salió <span>mal</span>';
      document.getElementById('sub').textContent = 'No pudimos identificar tu pedido.';
      document.getElementById('contenido').innerHTML = `<a href="index.html" class="btn btn-outline">Ir al inicio</a>`;
      return;
    }

    try {
      // ✅ Buscar el pedido en Firebase
      const snap = await db.collection('pedidos').doc(pedidoId).get();

      if (!snap.exists) {
        throw new Error('Pedido no encontrado');
      }

      const pedido = snap.data();

      // ✅ Marcar como pagado si todavía no lo está
      if (pedido.estado !== 'pagado') {
        await snap.ref.update({
          estado: 'pagado',
          fechaPago: new Date().toISOString()
        });
      }

      // ✅ Mostrar pantalla de éxito con descarga real
      mostrarDescarga(pedido.fotosIds || [], pedido.albumNombre || 'Rinascere');

    } catch (e) {
      console.error(e);
      document.getElementById('ico').textContent = '⚠️';
      document.getElementById('titulo').innerHTML = 'Error al <span>verificar</span>';
      document.getElementById('sub').textContent = 'Tu pago fue procesado pero no pudimos cargar las fotos. Guardá este link y escribinos.';
      const estadoEl = document.getElementById('estado');
      estadoEl.textContent = `Referencia de pedido: ${pedidoId}`;
      estadoEl.classList.add('visible');
      document.getElementById('contenido').innerHTML = `
        <a href="https://wa.me/542966346212?text=${encodeURIComponent('Hola! Pagué pero no pude descargar. Mi pedido es: ' + pedidoId)}" target="_blank" class="btn btn-dorado">💬 Contactar a Verónica</a>
        <a href="index.html" class="btn btn-outline">Ir al inicio</a>`;
    }
  }

  function mostrarDescarga(fotos, albumNombre) {
    document.getElementById('ico').textContent = '🎉';
    document.getElementById('titulo').innerHTML = '¡Listas para <span>descargar!</span>';
    document.getElementById('sub').textContent = 'Alta calidad sin marca de agua · Guardá las fotos en tu dispositivo';

    const esCelular = /Android|iPhone|iPad/i.test(navigator.userAgent);

    const grid = fotos.map((pid, i) => {
      const limpio = limpiarId(pid);
      const nombre = `rinascere_foto_${i + 1}`;
      return `
        <div class="descarga-item">
          <img src="https://res.cloudinary.com/${CLOUD}/image/upload/q_90/f_auto/w_300/${limpio}" alt="Foto ${i+1}" onerror="this.style.background='#eee';this.style.minHeight='80px';"/>
          <a href="${urlHD(limpio, nombre)}" download="${nombre}.jpg" target="_blank">⬇ Foto ${i+1}</a>
        </div>`;
    }).join('');

    document.getElementById('contenido').innerHTML = `
      <div class="descarga-grid">${grid}</div>
      <button class="btn btn-verde" onclick="descargarTodas()">⬇ Descargar todas las fotos</button>
      <p style="font-size:0.75rem;color:var(--gris);margin-bottom:16px;">📱 En el celular: tocá cada foto y mantené presionada para guardar en tu galería</p>
      <a href="index.html" class="btn btn-outline">← Volver al inicio</a>`;

    // Guardar referencia para descargarTodas()
    window._fotosDescarga = fotos.map((pid, i) => ({
      url: urlHD(limpiarId(pid), `rinascere_foto_${i+1}`),
      nombre: `rinascere_foto_${i+1}.jpg`
    }));
    window._esCelular = esCelular;
  }

  function descargarTodas() {
    const fotos = window._fotosDescarga || [];
    if (window._esCelular) {
      fotos.forEach((f, i) => setTimeout(() => window.open(f.url, '_blank'), i * 700));
    } else {
      fotos.forEach((f, i) => setTimeout(() => {
        const a = document.createElement('a');
        a.href = f.url;
        a.download = f.nombre;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, i * 900));
    }
  }

  init();
</script>
</body>
</html>
