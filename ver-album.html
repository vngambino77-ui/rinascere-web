<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Álbum - Ph. Rinascere</title>
    <link rel="icon" href="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 2px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 50px;
        }

        .album-title {
            font-size: 1.8em;
            color: #d4af37;
            text-align: center;
            flex: 1;
        }

        .back-btn {
            background: #d4af37;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #f0c14b;
            transform: scale(1.05);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .album-info {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            color: #d4af37;
            font-size: 1.3em;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2em;
            color: #d4af37;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            border-color: #d4af37;
        }

        .photo-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 15px;
        }

        .photo-number {
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 40px auto;
            max-width: 600px;
        }

        /* Lightbox para vista completa */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            padding: 15px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 1001;
        }

        .lightbox-close:hover {
            background: #f0c14b;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.8);
            color: #1a1a1a;
            border: none;
            padding: 20px;
            cursor: pointer;
            font-size: 2em;
            z-index: 1001;
            border-radius: 5px;
        }

        .nav-btn:hover {
            background: #d4af37;
        }

        .nav-btn.prev {
            left: 20px;
        }

        .nav-btn.next {
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://res.cloudinary.com/dwqvqpkbe/image/upload/rinascere" alt="Logo" class="logo">
        <h1 class="album-title" id="albumName">Cargando álbum...</h1>
        <a href="admin.html" class="back-btn">← Volver al Admin</a>
    </div>

    <div class="container">
        <div class="album-info" id="albumInfo" style="display: none;">
            <div class="info-item">
                <div class="info-label">Fecha</div>
                <div class="info-value" id="albumDate">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">Total de fotos</div>
                <div class="info-value" id="photoCount">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Método</div>
                <div class="info-value" id="albumMethod">-</div>
            </div>
        </div>

        <div class="loading" id="loading">Cargando fotos del álbum</div>
        <div class="error" id="error" style="display: none;"></div>
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- Lightbox para vista completa -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕ Cerrar</button>
        <button class="nav-btn prev" onclick="navigatePhoto(-1)">‹</button>
        <button class="nav-btn next" onclick="navigatePhoto(1)">›</button>
        <div class="lightbox-content">
            <img id="lightboxImg" class="lightbox-img" src="" alt="Foto completa">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, doc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCikmYa4r3LwdWDUZX9_RL9lx_EqGUF1Bg",
            authDomain: "rinascere-fotos.firebaseapp.com",
            projectId: "rinascere-fotos",
            storageBucket: "rinascere-fotos.firebasestorage.app",
            messagingSenderId: "844732353699",
            appId: "1:844732353699:web:7654d5fc2b85754a123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentPhotoIndex = 0;
        let allPhotos = [];

        // Obtener ID del álbum desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const albumId = urlParams.get('id');

        if (!albumId) {
            showError('No se especificó un álbum. Por favor, vuelve al panel de administración.');
        } else {
            loadAlbum(albumId);
        }

        async function loadAlbum(albumId) {
            try {
                // Cargar datos del álbum
                const albumDoc = await getDoc(doc(db, 'albumes', albumId));
                
                if (!albumDoc.exists()) {
                    showError('El álbum solicitado no existe.');
                    return;
                }

                const albumData = albumDoc.data();
                
                // Actualizar información del álbum
                document.getElementById('albumName').textContent = albumData.nombre || 'Álbum sin nombre';
                document.getElementById('albumDate').textContent = albumData.fecha || 'Sin fecha';
                document.getElementById('albumMethod').textContent = albumData.metodo || 'N/A';
                document.getElementById('albumInfo').style.display = 'flex';

                // Cargar fotos del álbum
                const photosCollection = collection(db, 'albumes', albumId, 'fotos');
                const photosSnapshot = await getDocs(photosCollection);
                
                allPhotos = [];
                photosSnapshot.forEach((doc) => {
                    allPhotos.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });

                // Ordenar fotos por número de dorsal si existe
                allPhotos.sort((a, b) => {
                    const dorsalA = parseInt(a.dorsal) || 0;
                    const dorsalB = parseInt(b.dorsal) || 0;
                    return dorsalA - dorsalB;
                });

                document.getElementById('photoCount').textContent = allPhotos.length;

                if (allPhotos.length === 0) {
                    showError('Este álbum no tiene fotos aún.');
                    return;
                }

                // Renderizar galería
                renderGallery();
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error('Error al cargar el álbum:', error);
                showError('Error al cargar el álbum: ' + error.message);
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            allPhotos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.onclick = () => openLightbox(index);

                const img = document.createElement('div');
                img.className = 'photo-img';
                img.src = photo.url;
                img.alt = `Foto ${photo.dorsal || index + 1}`;
                img.loading = 'lazy';

                const info = document.createElement('div');
                info.className = 'photo-info';
                
                const number = document.createElement('div');
                number.className = 'photo-number';
                number.textContent = photo.dorsal ? `Dorsal: ${photo.dorsal}` : `Foto #${index + 1}`;

                info.appendChild(number);
                card.appendChild(img);
                card.appendChild(info);
                gallery.appendChild(card);
            });
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
        }

        // Funciones del lightbox
        window.openLightbox = function(index) {
            currentPhotoIndex = index;
            document.getElementById('lightboxImg').src = allPhotos[index].url;
            document.getElementById('lightbox').classList.add('active');
        };

        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.remove('active');
        };

        window.navigatePhoto = function(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = allPhotos.length - 1;
            if (currentPhotoIndex >= allPhotos.length) currentPhotoIndex = 0;
            document.getElementById('lightboxImg').src = allPhotos[currentPhotoIndex].url;
        };

        // Cerrar lightbox con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigatePhoto(-1);
            if (e.key === 'ArrowRight') navigatePhoto(1);
        });
    </script>
</body>
</html>
