<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum</title>

<style>
body {
  font-family: Arial;
  background: #1a1a1a;
  color: white;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 8px;
}

button {
  padding: 15px;
  background: gold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1 id="titulo">Cargando...</h1>

<div class="gallery" id="gallery"></div>

<button onclick="comprarFotos()">💰 Comprar fotos</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "rinascere-fotos.firebaseapp.com",
  projectId: "rinascere-fotos"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// obtener id
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const gallery = document.getElementById("gallery");

async function cargar() {

  const albumDoc = await getDoc(doc(db, "albumes", id));

  if (!albumDoc.exists()) {
    document.body.innerHTML = "Álbum no existe";
    return;
  }

  const album = albumDoc.data();
  document.getElementById("titulo").innerText = album.nombre;

  const fotosSnap = await getDocs(collection(db, "albumes", id, "fotos"));

  fotosSnap.forEach((f, index) => {

    const data = f.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${data.url}">
      <br>
      <input type="checkbox" value="${data.url}">
    `;

    gallery.appendChild(div);
  });
}

cargar();

// 💰 COMPRA
window.comprarFotos = async function() {

  const seleccionadas = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
    .map(el => el.value);

  if (seleccionadas.length === 0) {
    alert("Seleccioná fotos");
    return;
  }

  const res = await fetch("/api/crearPago", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      fotos: seleccionadas,
      precio: 1500,
      titulo: "Fotos Rinascere"
    })
  });

  const data = await res.json();

  if (data.init_point) {
    window.location.href = data.init_point;
  } else {
    alert("Error en pago");
  }
};
</script>

</body>
</html>
