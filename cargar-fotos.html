<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Fotos - Rinascere</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #d4af37;
        }
        h1 {
            color: #d4af37;
            margin-bottom: 30px;
            text-align: center;
        }
        .section {
            background: rgba(255,255,255,0.03);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        h2 {
            color: #d4af37;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { background: #f0c14b; }
        input[type="file"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px dashed #d4af37;
            border-radius: 5px;
            color: #f5f5f5;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .preview { max-width: 200px; margin: 15px 0; border-radius: 5px; }
        .btn-upload {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-upload:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }
        .status.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }
        .status.error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #dc2626;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="admin.html" class="btn">← Volver al Admin</a>
        <h1>📸 Cargar Fotos Web</h1>

        <!-- Foto Sobre mí -->
        <div class="section">
            <h2>Foto "Sobre mí"</h2>
            <input type="file" id="fotoSobreMi" accept="image/*">
            <img id="previewSobreMi" class="preview" style="display:none;">
            <button class="btn-upload" id="btnSobreMi" onclick="subirSobreMi()">⬆️ Subir Foto Sobre mí</button>
            <div class="status" id="statusSobreMi"></div>
        </div>

        <!-- Fotos Portfolio -->
        <div class="section">
            <h2>Fotos Portfolio (máx. 6)</h2>
            <input type="file" id="fotosPortfolio" accept="image/*" multiple>
            <p style="color: #999; margin-bottom: 15px;">Seleccioná hasta 6 fotos</p>
            <button class="btn-upload" id="btnPortfolio" onclick="subirPortfolio()">⬆️ Subir Fotos Portfolio</button>
            <div class="status" id="statusPortfolio"></div>
        </div>
    </div>

    <script>
        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dwqvqpkbe/image/upload';
        const UPLOAD_PRESET = 'rinascere_fotos';

        // Preview foto Sobre mí
        document.getElementById('fotoSobreMi').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('previewSobreMi');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Subir foto Sobre mí
        async function subirSobreMi() {
            const file = document.getElementById('fotoSobreMi').files[0];
            if (!file) {
                mostrarStatus('statusSobreMi', 'error', '⚠️ Seleccioná una foto');
                return;
            }

            const btn = document.getElementById('btnSobreMi');
            btn.disabled = true;
            btn.textContent = '⏳ Subiendo...';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('folder', 'rinascere');
                formData.append('public_id', 'vero-profile');

                const response = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Error al subir');

                const data = await response.json();
                mostrarStatus('statusSobreMi', 'success', `✅ Foto subida exitosamente\n${data.secure_url}`);

            } catch (error) {
                mostrarStatus('statusSobreMi', 'error', '❌ Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '⬆️ Subir Foto Sobre mí';
            }
        }

        // Subir fotos Portfolio
        async function subirPortfolio() {
            const files = Array.from(document.getElementById('fotosPortfolio').files);
            if (files.length === 0) {
                mostrarStatus('statusPortfolio', 'error', '⚠️ Seleccioná al menos 1 foto');
                return;
            }

            if (files.length > 6) {
                mostrarStatus('statusPortfolio', 'error', '⚠️ Máximo 6 fotos');
                return;
            }

            const btn = document.getElementById('btnPortfolio');
            btn.disabled = true;

            try {
                const urls = [];

                for (let i = 0; i < files.length; i++) {
                    btn.textContent = `⏳ Subiendo ${i + 1}/${files.length}...`;

                    const formData = new FormData();
                    formData.append('file', files[i]);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    formData.append('folder', 'rinascere');
                    formData.append('public_id', `portfolio-${i + 1}`);

                    const response = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error(`Error en foto ${i + 1}`);

                    const data = await response.json();
                    urls.push(data.secure_url);
                }

                mostrarStatus('statusPortfolio', 'success', `✅ ${urls.length} fotos subidas\n\n` + urls.join('\n'));

            } catch (error) {
                mostrarStatus('statusPortfolio', 'error', '❌ ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '⬆️ Subir Fotos Portfolio';
            }
        }

        function mostrarStatus(id, tipo, mensaje) {
            const status = document.getElementById(id);
            status.className = `status ${tipo}`;
            status.textContent = mensaje;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
